<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CertChain - Login</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="title">
            <span class="c1">CERT</span><span class="c2">CHAIN</span>
        </div>
        <div class="subtitle">
            BLOCKCHAIN-POWERED CREDENTIALS
        </div>
        <div class="login-box">
            <h2>User Login</h2>
            <form id="loginForm">
                <input type="text" placeholder="Email or Username" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <div class="signup">
                Don't have an account? <a href="user.html">Sign Up</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const emailInput = document.querySelector('#loginForm input[type="text"]');
            const userEmail = emailInput.value;

            // In a real app, you'd verify credentials. Here, we'll just store
            // the user's email to be displayed on the dashboard.
            localStorage.setItem('certchainUser', JSON.stringify({ email: userEmail }));

            window.location.href = 'certchain-dashboard.html';
        });
    </script>
</body>
</html>
