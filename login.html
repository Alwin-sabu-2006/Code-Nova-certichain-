<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CertChain - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#020d1f;
color:white;

display:flex;
justify-content:center;
align-items:center;

height:100vh;
}

.login-container{
text-align:center;
}

.title{
font-family:'Orbitron', sans-serif;
font-size:40px;
letter-spacing:8px;
font-weight:700;
}

.c1{
color:#00eaff;
text-shadow:0 0 10px #00eaff;
}

.c2{
color:#ffd400;
text-shadow:0 0 10px #ffd400;
}

.subtitle{
color:#ffd400;
letter-spacing:4px;
margin-bottom:40px;
}

.login-box{
width:350px;
padding:30px;

border:1px solid #1b3b63;
border-radius:10px;

background:#061833;
}

.login-box h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:12px;

background:#020d1f;
border:1px solid #1b3b63;

color:white;
}

button{
width:100%;
padding:14px;
margin-top:20px;

background:#00eaff;

border:none;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00c9d8;
}

.signup{
margin-top:15px;
font-size:14px;
}

.signup a{
color:#ffd400;
text-decoration:none;
}

</style>

</head>

<body>

<div class="login-container">

<div class="title">
<span class="c1">CERT</span><span class="c2">CHAIN</span>
</div>

<div class="subtitle">
BLOCKCHAIN-POWERED CREDENTIALS
</div>

<div class="login-box">

<h2>User Login</h2>

<form id="loginForm">
<input type="text" id="loginEmail" placeholder="Email or Username" required>
<input type="password" id="loginPassword" placeholder="Password" required>
<button type="submit">Login</button>
</form>

<div class="signup">
Don't have an account? <a href="user.html">Sign Up</a>
</div>

</div>
</div>

<script>

document.getElementById('loginForm').addEventListener('submit', function(event) {

event.preventDefault();

const emailInput = document.getElementById('loginEmail').value;
const passwordInput = document.getElementById('loginPassword').value;

if (!emailInput || !passwordInput) {
    alert("Please enter your username and password.");
    return;
}

alert("Login Successful!");
localStorage.setItem('certchainUser', JSON.stringify({ email: emailInput }));

window.location.href = 'upload.html';

});

</script>

</body>
</html>
